include:
  - template: Jobs/Code-Quality.gitlab-ci.yml
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml
  - template: Jobs/Container-Scanning.gitlab-ci.yml

stages:
  - build
  - test
  - post
  - migrate
  - deploy

.runner_sg_guard:
  before_script:
    - python3 /app/scripts/get_config_files.py
    - export RUNNER_IP=$(curl -s ifconfig.me)
    - 'echo "runner IP: $RUNNER_IP"'
    - echo "$RUNNER_IP" > .runner_ip
    - python3 /app/scripts/add_runner_ip_to_sg.py
  after_script:
    - python3 /app/scripts/get_config_files.py
    - export RUNNER_IP="$(cat .runner_ip 2>/dev/null || true)"
    - 'echo "cleanup IP: ${RUNNER_IP:-not-set}"'
    - python3 /app/scripts/remove_runner_ip_from_sg.py

default:
  tags:
    - amd64-docker

build_image:
  stage: build
  image: docker:25
  tags:
    # Temporary: GitLab SaaS shared runner — reliable docker:dind until self-hosted runner has privileged DinD
    - saas-linux-medium-amd64
  services: 
    - docker:dind
  script:
    - cd $ROOT_FOLDER
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $CI_REGISTRY_IMAGE:$TAG -f docker/Dockerfile .
    - docker push $CI_REGISTRY_IMAGE:$TAG
  rules:
    - if: $CI_PIPELINE_SOURCE == "pipeline"
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      variables:
        TAG: merge_requests
    - if: $CI_COMMIT_TAG
      variables:
        TAG: $CI_COMMIT_TAG
    - when: never

semgrep-sast:
  script:
    - /analyzer run
    - mv gl-sast-report.json semgrep-sast-report.json
  artifacts:
    paths:
      - semgrep-sast-report.json
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge-request-event"

secret_detection:
  script:
    - /analyzer run
    - mv gl-secret-detection-report.json secret-detection-report.json
  artifacts:
    paths:
      - secret-detection-report.json
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge-request-event"

code_quality:
  rules:
    - if: $CODE_QUALITY_DISABLED
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - when: never

container_scanning:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      variables:
        TAG: merge_requests
        GIT_STRATEGY: fetch
        CS_IMAGE: $CI_REGISTRY_IMAGE:$TAG

analyze_reports:
  stage: post
  image: registry.gitlab.com/detecttechnologies/software/webapps/t-pulse/web/tpulse-msa/tpulse-msa-cicd:production
  variables:
    DOCKER_AUTH_CONFIG: '{"auths":{"registry.gitlab.com":{"username":"${CI_CD_API_USER}","password":"${CI_CD_API_TOKEN}"}}}'
  script:
    - bash /app/scripts/analyze_reports.sh
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge-request-event"

update_version_manifest:
  stage: post
  image: registry.gitlab.com/detecttechnologies/software/webapps/t-pulse/web/tpulse-msa/tpulse-msa-cicd:production
  variables:
    DOCKER_AUTH_CONFIG: '{"auths":{"registry.gitlab.com":{"username":"${CI_CD_API_USER}","password":"${CI_CD_API_TOKEN}"}}}'
  script:
    - python3 /app/scripts/version_manifest_manager.py
  rules:
    - if: $CI_PIPELINE_SOURCE == "pipeline"
      when: never
    - if: $CI_COMMIT_TAG 

deploy_docker:
  stage: deploy
  image: registry.gitlab.com/detecttechnologies/software/webapps/t-pulse/web/tpulse-msa/tpulse-msa-cicd:production
  services:
    - name: docker:dind
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2375/
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2
    DOCKER_AUTH_CONFIG: '{"auths":{"registry.gitlab.com":{"username":"${CI_CD_API_USER}","password":"${CI_CD_API_TOKEN}"}}}'
  tags:
    # Temporary: GitLab SaaS shared runner — reliable docker:dind until self-hosted runner has privileged DinD
    - saas-linux-medium-amd64
  environment:
    name: $LIFECYCLE_STAGE
  script:
    - python3 /app/scripts/get_config_files.py
    - python3 /app/scripts/push_ecr.py
    - python3 /app/scripts/update_ecs_service.py
    - python3 /app/scripts/restart_ecs.py
  rules:
    - if: $CI_PIPELINE_SOURCE == "pipeline"
    - when: never

migrations:
  extends: .runner_sg_guard
  stage: migrate
  image: registry.gitlab.com/detecttechnologies/software/webapps/t-pulse/web/tpulse-msa/tpulse-msa-cicd:production
  variables:
    DOCKER_AUTH_CONFIG: '{"auths":{"registry.gitlab.com":{"username":"${CI_CD_API_USER}","password":"${CI_CD_API_TOKEN}"}}}'
  tags:
    - amd64-docker
  environment:
    name: $LIFECYCLE_STAGE
  script:
    - python3 /app/scripts/get_config_files.py
    - bash /app/scripts/handle_db_operations.sh
  rules:
    - if: $CI_PROJECT_NAME == "tpulse-msa-be-central-dashboard"
      when: never
    - if: $CI_PIPELINE_SOURCE == "pipeline"
    - when: never
