stages:
  - validate

MR-title-check:
  stage: validate
  tags: [dt-gitlab-runner-t3a.small]
  script:
    - |
      FIRST_CHAR="${CI_MERGE_REQUEST_TITLE%"${CI_MERGE_REQUEST_TITLE#?}"}"
      case "${FIRST_CHAR}" in
        [\u0000-\u007F]*)
          echo "Merge request title does not start with a unicode gitmoji. Validation failed."
          exit 1
          ;;
        *)
          echo "Merge request title starts with a non-ASCII(0-127) character, and possibly a unicode gitmoji. Validation passed."
          ;;
      esac
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always

docs-spellcheck:
  stage: validate
  tags: [dt-gitlab-runner-t3a.small]
  script:
    - |
      docker run --rm -v "$(pwd)":/workspace -w /workspace python:slim \
        bash -c 'pip install -q codespell && shopt -s globstar && FILES=$( (ls **/*.py; ls **/*.md) | tr "\n" " ") && codespell ${FILES}'
  rules:
    - if: '$CI_MERGE_REQUEST_LABELS =~ /skip-validation/'
      when: never
    - if: '$CI_COMMIT_REF_NAME == "main"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always

docs-markdownlint:
  stage: validate
  tags: [dt-gitlab-runner-t3a.small]
  script:
    - docker run --rm -v "$(pwd)":/workspace -w /workspace ghcr.io/igorshubovych/markdownlint-cli:latest --disable MD033 MD013 MD034 MD041 MD024 MD036 -- .
  rules:
    - if: '$CI_MERGE_REQUEST_LABELS =~ /skip-validation/'
      when: never
    - if: '$CI_COMMIT_REF_NAME == "main"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
