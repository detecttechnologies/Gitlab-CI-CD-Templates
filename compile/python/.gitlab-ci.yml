# Check if all the submodules that have been added are valid submodules
build-check-submodules:
  stage: validate
  tags:
    - amd64
  script:
    - git config --global url."https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/".insteadOf "git@gitlab.com:"
    - git submodule sync && git submodule update --init --recursive
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

build_binaries:
  stage: build
  tags:
    - amd64-xlarge
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY 2>/dev/null || true
    - git config --global url."https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/".insteadOf "git@gitlab.com:"
    - git submodule sync && git submodule update --init --recursive --jobs $(nproc)
  script:
    - |
      docker run --rm \
        -v "$(pwd)":/workspace -w /workspace \
        -e CI_JOB_TOKEN="$CI_JOB_TOKEN" \
        -e EXCLUDE_FILES="${EXCLUDE_FILES}" \
        registry.gitlab.com/detecttechnologies/platform/ci-cd-pipelines/python-ops/pythoncompiler:2.0-${PLATFORM}-${VERSION} \
        bash -c "curl -fsSL https://github.com/detecttechnologies/Gitlab-CI-CD-Templates/raw/main/compile/python/build-binaries.sh -o /tmp/build-binaries.sh && bash /tmp/build-binaries.sh"
  artifacts:
    paths:
      - artifacts/
  parallel:
    matrix:
      - PLATFORM: amd64
        VERSION: [py3.11]
  only:
    refs:
      - main

push_binaries:
  stage: push
  tags:
    - amd64
  before_script:
    - git config --global url."https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/".insteadOf "git@gitlab.com:"
    - git submodule sync && git submodule update --init --recursive
    - git config --global user.email "PlatformTeam@detecttechnologies.com"
    - git config --global user.name "Detect Gitlab Bot"
  script:
    - |
      docker run --rm \
        -v "$(pwd)":/workspace -w /workspace \
        -e CI_JOB_TOKEN="$CI_JOB_TOKEN" \
        -e CI_SERVER_HOST="${CI_SERVER_HOST}" \
        -e CI_PROJECT_PATH="${CI_PROJECT_PATH}" \
        -e BOT_ACCESS_TOKEN="${BOT_ACCESS_TOKEN}" \
        -e BUILD_OUTPUT_REPO="${BUILD_OUTPUT_REPO}" \
        -e COPY_FILES="${COPY_FILES}" \
        -e RUN_SCRIPTS="${RUN_SCRIPTS}" \
        ubuntu:24.04 \
        bash -c "apt-get update -qq && apt-get install -y -qq git git-lfs curl && git config --global --add safe.directory /workspace && git config --global user.email PlatformTeam@detecttechnologies.com && git config --global user.name 'Detect Gitlab Bot' && git lfs install && git config --global credential.helper store && printf 'https://gitlab-ci-token:%s@gitlab.com\n' \"\$CI_JOB_TOKEN\" > /root/.git-credentials && git lfs pull && curl -fsSL https://github.com/detecttechnologies/Gitlab-CI-CD-Templates/raw/main/compile/python/push-binaries.sh -o /tmp/push-binaries.sh && bash /tmp/push-binaries.sh"
  only:
    refs:
      - main
